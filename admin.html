<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVOLVE | Backend Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0a0c;--surface:#151518;--accent:#e8ff47;--text:#fff;--border:#2a2a30;--font-head:'Bebas Neue',display;--font-body:'DM Sans',sans-serif;}
        body{background:var(--bg);color:var(--text);font-family:var(--font-body);padding:3rem;}
        h1,h2,h3{font-family:var(--font-head);color:var(--accent);letter-spacing:1px;font-weight:normal;}
        .card{background:var(--surface);border:1px solid var(--border);padding:2rem;border-radius:8px;margin-bottom:2rem;overflow-x:auto;}
        table{width:100%;border-collapse:collapse;margin-top:1rem;color:#ddd;}
        th,td{padding:1rem;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);}
        th{color:#888;text-transform:uppercase;font-size:0.9rem;border-bottom:2px solid var(--border);}
        tr:hover{background:rgba(255,255,255,0.02);}
        input{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:0.75rem;border-radius:4px;width:300px;font-family:var(--font-body);}
        input:focus{outline:none;border-color:var(--accent);}
        .btn{background:var(--accent);color:#000;border:none;padding:0.5rem 1rem;font-family:var(--font-head);border-radius:4px;cursor:pointer;text-transform:uppercase;font-size:1.1rem;transition:0.3s;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
        .export-btn{float:right;margin-top:-40px;}
        .c-g{color:var(--accent);}
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Global Admin Control</h1>
        <input type="text" id="term" placeholder="Live filter member name..." onkeyup="filterT()">
    </div>
    <div id="content" style="color:#888; font-size:1.2rem">Fetching EVOLVE database mapping...</div>

    <script>
        let db = null; let uM = {};
        
        async function load() {
            let res = await fetch('/api/admin/dump');
            db = await res.json();
            db.users.forEach(u => uM[u.id] = u.name);
            paint();
        }

        function tpl(id, head, cols, rows) {
            return `<div class="card"><h2>${head}</h2><button class="btn export-btn" onclick="exp('${id}','${head}')">Export CSV</button><table id="${id}" class="adm-tb"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        function paint() {
            let core = '';
            
            let mx = db.users.filter(u=>u.role==='member').map(u => `<tr data-n="${u.name.toLowerCase()}"><td>${u.name}</td><td>${u.email}</td><td>${u.age||'--'}</td><td>${u.sw||'--'}kg</td><td class="c-g">${u.plan||'Basic'}</td><td>${u.reg}</td></tr>`).join('');
            core += tpl('mems-tb', 'Users Data', ['Name','Email','Age','Start Weight','Membership Plan','Join Date'], mx || '<tr><td colspan="6">No records</td></tr>');

            let ax = [...(db.attendance||[])].reverse().map(a => `<tr data-n="${(uM[a.userId]||'').toLowerCase()}"><td>${uM[a.userId]||'Unknown'}</td><td>${a.date}</td><td>${a.ts ? new Date(a.ts).toLocaleTimeString() : '--'}</td></tr>`).join('');
            core += tpl('atts-tb', 'Attendance Log', ['Member Name','Date','Check-in Time'], ax || '<tr><td colspan="3">No records</td></tr>');

            let px = [...(db.progress||[])].reverse().map(p => `<tr data-n="${(uM[p.userId]||'').toLowerCase()}"><td>${uM[p.userId]||'Unknown'}</td><td>${p.date}</td><td class="c-g">${p.weight}kg</td><td>${p.notes||'--'}</td></tr>`).join('');
            core += tpl('prog-tb', 'Progress Entries', ['Member Name','Date Logged','Body Weight','Notes'], px || '<tr><td colspan="4">No records</td></tr>');

            let ox = [...(db.orders||[])].reverse().map(o => {
                let list = (o.items||[]).map(i=>`${i.q}x ${i.n}`).join(' & ');
                let ttl = (o.items||[]).reduce((a,b)=>a+(b.p*b.q),0);
                let tgtName = uM[o.userId]||uM[o.uid]||'Unknown';
                return `<tr data-n="${tgtName.toLowerCase()}"><td>${tgtName}</td><td>${list}</td><td class="c-g">₹${ttl}</td><td>${o.date||'--'}</td></tr>`;
            }).join('');
            core += tpl('ords-tb', 'Shop Orders', ['Member Name','Items Purchased','Total Amount','Transaction Date'], ox || '<tr><td colspan="4">No records</td></tr>');

            document.getElementById('content').innerHTML = core;
        }

        function filterT() {
            let q = document.getElementById('term').value.toLowerCase();
            document.querySelectorAll('.adm-tb tbody tr').forEach(tr => {
                if(!tr.getAttribute('data-n')) return;
                tr.style.display = tr.getAttribute('data-n').includes(q) ? '' : 'none';
            });
        }

        function exp(tId, tn) {
            let rw = document.querySelectorAll(`#${tId} tr`); let cx = [];
            rw.forEach(x => {
                if(x.style.display !== 'none') {
                    let cv = []; x.querySelectorAll('th,td').forEach(tc => cv.push('"' + tc.innerText + '"'));
                    cx.push(cv.join(','));
                }
            });
            let bl = new Blob([cx.join('\\n')], {type:'text/csv'});
            let a = document.createElement('a'); a.href = URL.createObjectURL(bl);
            a.download = tn.replace(/ /g, '_') + '.csv'; a.click();
        }

        window.onload = load;
    </script>
</body>
</html>
